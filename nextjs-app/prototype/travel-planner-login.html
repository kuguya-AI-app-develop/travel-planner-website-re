
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行策划 — 登录</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAFA;
  --surface:#FFFFFF;
  --fg:#1A1A1A;
  --muted:#71717A;
  --muted-light:#A1A1AA;
  --border:#E4E4E7;
  --border-light:#F0F0F2;
  --accent:#0500FF;
  --accent-hover:#0400D6;
  --accent-subtle:#EEEEFF;
  --accent-glow:rgba(5,0,255,0.08);
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  --font-display:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:18px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04);
  --shadow-md:0 4px 14px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.10);
}
html{font-size:14px}
body{
  font-family:var(--font-body);color:var(--fg);background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55;
  background-image:
    radial-gradient(circle,oklch(80% 0.008 265 / 25%) 1px,transparent 1px);
  background-size:24px 24px;
}
.login-container{
  width:100%;max-width:420px;padding:20px;
}
.login-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:40px 36px 32px;
  box-shadow:var(--shadow-lg);
}
.login-brand{
  display:flex;align-items:center;gap:10px;
  font-weight:700;font-size:16px;letter-spacing:-0.02em;
  margin-bottom:6px;
}
.login-brand svg{flex-shrink:0}
.login-subtitle{
  font-size:13px;color:var(--muted);margin-bottom:32px;
  line-height:1.5;
}
.login-form{display:flex;flex-direction:column;gap:16px}
.login-field{display:flex;flex-direction:column;gap:5px}
.login-field label{
  font-size:12px;font-weight:500;color:var(--muted);
  letter-spacing:0.02em;
}
.login-input-wrap{position:relative}
.login-input{
  width:100%;padding:10px 14px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:14px;font-family:var(--font-body);
  outline:none;transition:all .15s;background:var(--surface);
  color:var(--fg);
}
.login-input::placeholder{color:var(--muted-light)}
.login-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.login-input.has-toggle{padding-right:42px}
.login-toggle{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted-light);border-radius:8px;transition:all .12s;
}
.login-toggle:hover{color:var(--fg);background:var(--border-light)}
.login-row{
  display:flex;align-items:center;
  font-size:12.5px;
}
.login-remember{
  display:flex;align-items:center;gap:6px;
  color:var(--muted);cursor:pointer;user-select:none;
}
.login-remember input[type="checkbox"]{
  width:15px;height:15px;accent-color:var(--accent);cursor:pointer;
}

.login-btn{
  padding:11px 20px;border-radius:var(--radius);
  font-size:14px;font-weight:600;cursor:pointer;
  border:none;background:var(--accent);color:white;
  transition:all .15s;font-family:var(--font-body);
  width:100%;margin-top:4px;letter-spacing:0.01em;
}
.login-btn:hover{background:var(--accent-hover)}
.login-btn:active{transform:scale(0.99)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}


.login-error{
  background:oklch(95% 0.04 25);color:oklch(50% 0.18 25);
  border:1px solid oklch(88% 0.06 25);
  border-radius:var(--radius);padding:10px 14px;
  font-size:12.5px;display:none;align-items:center;gap:8px;
  margin-bottom:12px;
}
.login-error.show{display:flex}
.login-error svg{flex-shrink:0}
@media (max-width:480px){
  .login-container{padding:12px}
  .login-card{padding:28px 24px 24px;border-radius:var(--radius-lg)}
  .login-brand{font-size:15px}
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="24" height="24" rx="7" fill="#EEEEFF" stroke="#0500FF" stroke-width="1.1"/>
        <path d="M14 6C11.2 6 9 8.2 9 11c0 3.5 5 10 5 10s5-6.5 5-10c0-2.8-2.2-5-5-5z" fill="#0500FF" fill-opacity=".15" stroke="#0500FF" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="14" cy="11" r="2" fill="#0500FF" fill-opacity=".4" stroke="#0500FF" stroke-width="1"/>
      </svg>
      旅行策划
    </div>
    <p class="login-subtitle">登录你的账户，开始规划下一段旅程</p>

    <div class="login-error" id="login-error">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M8 5v3.5M8 10.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span id="login-error-text">邮箱或密码不正确，请重试</span>
    </div>

    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="login-field">
        <label for="login-email">邮箱</label>
        <input class="login-input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email" required>
      </div>

      <div class="login-field">
        <label for="login-password">密码</label>
        <div class="login-input-wrap">
          <input class="login-input has-toggle" type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" required>
          <button type="button" class="login-toggle" id="pw-toggle" onclick="togglePassword()">
            <svg id="pw-eye-open" width="18" height="18" viewBox="0 0 20 20" fill="none">
              <path d="M1.5 10s3.5-5.5 8.5-5.5S18.5 10 18.5 10s-3.5 5.5-8.5 5.5S1.5 10 1.5 10z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            <svg id="pw-eye-closed" width="18" height="18" viewBox="0 0 20 20" fill="none" style="display:none">
              <path d="M2.5 2.5l15 15M1.5 10s3.5-5.5 8.5-5.5c1.5 0 2.8.4 4 1M18.5 10s-1.2 1.7-3.2 3M8.5 10.5a3 3 0 004 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-row">
        <label class="login-remember"><input type="checkbox" id="login-remember"> 记住我</label>

      </div>

      <button type="submit" class="login-btn" id="login-btn">登录</button>
    </form>


  </div>
</div>

<script>
function togglePassword() {
  var pw = document.getElementById('login-password');
  var open = document.getElementById('pw-eye-open');
  var closed = document.getElementById('pw-eye-closed');
  if (pw.type === 'password') {
    pw.type = 'text';
    open.style.display = 'none';
    closed.style.display = '';
  } else {
    pw.type = 'password';
    open.style.display = '';
    closed.style.display = 'none';
  }
}

function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var btn = document.getElementById('login-btn');
  var error = document.getElementById('login-error');

  if (!email || !password) {
    error.classList.add('show');
    document.getElementById('login-error-text').textContent = '请填写邮箱和密码';
    return;
  }

  btn.textContent = '登录中...';
  btn.disabled = true;
  error.classList.remove('show');

  setTimeout(function() {
    btn.textContent = '登录';
    btn.disabled = false;
    error.classList.add('show');
    document.getElementById('login-error-text').textContent = '邮箱或密码不正确，请重试';
  }, 1500);
}

</script>
</body>
</html>
